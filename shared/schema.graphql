"""
Amazon Standard Identification Number (10 alphanumeric characters)
"""
scalar Asin

"""
Audible integration
"""
type Audible {
  """
  Import state
  """
  import: AudibleImport!

  """
  Synchronization state
  """
  sync: AudibleSync!
}

"""
An Audible library or wishlist entry
"""
type AudibleEntry {
  """
  Amazon Standard Identification Number
  """
  asin: Asin!

  """
  Author names
  """
  authors: [String!]!

  """
  Cover image URL
  """
  coverUrl: Url

  """
  Download timestamp
  """
  downloadedAt: DateTime!

  """
  Duration in minutes
  """
  durationMinutes: Int!

  """
  Date the book was finished listening
  """
  finishedAt: DateTime

  """
  Language
  """
  language: String

  """
  Narrator names
  """
  narrators: [String!]!

  """
  Publisher name
  """
  publisher: String

  """
  Release date
  """
  releaseDate: DateTime

  """
  Series name
  """
  seriesName: String

  """
  Position in the series
  """
  seriesPosition: Int

  """
  Item source
  """
  source: AudibleSource!

  """
  Book title
  """
  title: String!
}

"""
Audible import state
"""
type AudibleImport {
  """
  Import task completion date
  """
  completedAt: DateTime

  """
  Number of items processed in current run
  """
  current: Int!

  """
  Items remaining to import
  """
  delta: Int!

  """
  Number of books imported so far
  """
  importedCount: Int!

  """
  Current progress message
  """
  message: String!

  """
  Current task phase (idle, running, paused, cancelled, completed, failed)
  """
  phase: String!

  """
  Import task start date
  """
  startedAt: DateTime

  """
  Current import status
  """
  status: AudibleImportStatus!

  """
  Total items to process in current run
  """
  total: Int!

  """
  Total number of library items
  """
  totalCount: Int!

  """
  Last import state update
  """
  updatedAt: DateTime
}

"""
Audible import status (init | importing | imported)
"""
scalar AudibleImportStatus

"""
Audible item source (library | wishlist)
"""
scalar AudibleSource

"""
Audible synchronization state
"""
type AudibleSync {
  """
  Fetched Audible entries
  """
  entries(
    """
    Filter by source
    """
