type Mutation {
  """
  Add a review to a book (marks the book as read)
  """
  addReview(
    """
    Book ID
    """
    bookId: BookId!
    input: CreateReviewInput!
  ): Review!

  """
  Add a book to favorites (favorite rating + read status)
  """
  addToFavorites(
    """
    Book ID
    """
    id: BookId!
  ): Book!

  """
  Scan a book cover to extract metadata
  """
  analyzeBookCover(
    """
    Base64-encoded image
    """
    imageBase64: String!

    """
    Optional OCR text
    """
    ocrText: String
  ): BookPreview!

  """
  Scan an ISBN barcode. Returns null if the book already exists.
  """
  analyzeISBN(
    """
    ISBN code (10 or 13 digits)
    """
    isbn: ISBN!
  ): BookPreview

  """
  Import a book from a URL (Goodreads, Storygraph, etc.)
  """
  analyzeURL(
    """
    Shared description
    """
    description: String

    """
    Shared raw text
    """
    rawText: String

    """
    Book URL
    """
    url: Url!
  ): BookPreview!

  """
  Complete the Audible OAuth authentication
  """
  audibleAuthCallback(
    """
    Redirect URL with code
    """
    redirectUrl: String!

    """
    Session identifier
    """
    sessionId: String!
  ): Boolean!

  """
  Start the Audible OAuth authentication flow
  """
  audibleAuthStart(
    """
    Audible locale (default: fr)
    """
    locale: String
  ): AuthStartResponse!

  """
  Disconnect the Audible account and clean up data
  """
  audibleDisconnect: Boolean!

  """
  Cancel the running or paused Audible import
  """
  audibleImportCancel: AudibleImport!

  """
  Pause the running Audible import
  """
  audibleImportPause: AudibleImport!

  """
  Resume a paused Audible import
  """
  audibleImportResume: AudibleImport!

  """
  Start importing Audible books (background task)
  """
  audibleImportStart: AudibleImport!

  """
  Fetch the Audible library and wishlist (background task)
  """
  audibleSyncFetch: Boolean!

  """
  Verify the Audible credentials validity
  """
  audibleSyncVerify: Boolean!

  """
  Confirm and create a book from a scan preview
  """
  confirmBook(input: ConfirmBookInput!): ConfirmBookResult!

  """
  Delete a book and its associated data (review, series)
  """
  deleteBook(
    """
    ID of the book to delete
    """
    id: BookId!
  ): Boolean!

  """
  Re-enrich a book via Gemini (updates metadata)
  """
  refreshBook(
    """
    Book ID
    """
    id: BookId!
  ): Boolean!

  """
  Update an existing book
  """
  updateBook(
    """
    Book ID
    """
    id: BookId!
    input: UpdateBookInput!
  ): Book!
}

