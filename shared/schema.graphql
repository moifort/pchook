"""
Literary award received by a book
"""
type Award {
  """
  Short award name (e.g. "Prix Hugo", "Prix Goncourt")
  """
  name: String!

  """
  Year awarded (e.g. 2023)
  """
  year: Int
}

"""
Literary award
"""
input AwardInput {
  """
  Award name
  """
  name: String!

  """
  Year awarded
  """
