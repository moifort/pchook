"""Audible synchronization status"""
type AudibleSync {
  """Credentials configured"""
  connected: Boolean!

  """Fetch in progress"""
  fetchInProgress: Boolean!

  """Identifier of the Audible import task (use task query to get state)"""
  importTaskId: String!

  """Last fetch date"""
  lastFetchedAt: DateTime

  """Last sync date"""
  lastSyncAt: DateTime

  """Number of books in the library"""
  libraryCount: Int!

  """Number of raw items"""
  rawItemCount: Int!

  """Number of books in the wishlist"""
  wishlistCount: Int!
}

"""Audible authentication cookie"""
type AuthCookie {
  """Cookie domain"""
  domain: String!

  """Cookie name"""
  name: String!

  """Cookie value"""
  value: String!
}

"""Audible authentication start response"""
type AuthStartResponse {
  """Cookies to send with the login request"""
  cookies: [AuthCookie!]!

  """Audible login URL"""
  loginUrl: String!

  """Authentication session identifier"""
  sessionId: String!
}

"""Literary award received by a book"""
type Award {
  """Award name"""
  name: String!

  """Year awarded"""
  year: Int
}

"""Literary award"""
input AwardInput {
  """Award name"""
  name: String!

  """Year awarded"""
  year: Int
}

"""A book in the personal library"""
type Book {
  """Book authors"""
  authors: [String!]!

  """Literary awards"""
  awards: [Award!]!

  """Cover image URL"""
  coverImageUrl: String

  """Date added to library"""
  createdAt: DateTime!

  """Duration (audiobook)"""
  duration: String

  """Estimated price in euros"""
  estimatedPrice: Float

  """External URL (Audible, etc.)"""
  externalUrl: String

  """Book format"""
  format: BookFormat

  """Literary genre (e.g. Romance, Sci-Fi, Thriller)"""
  genre: String

  """Unique identifier"""
  id: ID!

  """Import source"""
  importSource: ImportSource

  """ISBN number"""
  isbn: String

  """Book language (e.g. fr, en)"""
  language: String

  """Narrators (audiobook)"""
  narrators: [String!]!

  """Page count"""
  pageCount: Int

  """Personal notes"""
  personalNotes: String

  """Community ratings"""
  publicRatings: [PublicRating!]!

  """Publication date"""
  publishedDate: DateTime

  """Publisher"""
  publisher: String

  """Read date"""
  readDate: DateTime

  """Personal review and rating"""
  review: Review

  """Series information"""
  series: SeriesInfo

  """Reading status"""
  status: BookStatus!

  """Book synopsis"""
  synopsis: String

  """Book title"""
  title: String!

  """Translator"""
  translator: String

  """Last modified date"""
  updatedAt: DateTime!
}

"""Book count by status"""
type BookCount {
  """Books read"""
  read: Int!

  """Books to read"""
  toRead: Int!

  """Total number of books"""
  total: Int!
}

"""Physical or digital book format"""
enum BookFormat {
  """Audiobook"""
  audiobook

  """E-book"""
  digital

  """Hardcover"""
  hardcover

  """Paperback"""
  paperback

  """Pocket book"""
  pocket
}

"""Book preview after scan (before confirmation)"""
type BookPreview {
  """Extracted authors"""
  authors: [String!]!

  """Literary awards"""
  awards: [Award!]!

  """Duration (audio)"""
  duration: String

  """Estimated price"""
  estimatedPrice: Float

  """Format"""
  format: String

  """Genre"""
  genre: String

  """ISBN"""
  isbn: String

  """Language"""
  language: String

  """Narrators"""
  narrators: [String!]

  """Page count"""
  pageCount: Int

  """Preview identifier"""
  previewId: String!

  """Community ratings"""
  publicRatings: [PublicRating!]!

  """Publication date"""
  publishedDate: String

  """Publisher"""
  publisher: String

  """Series"""
  series: String

  """Series label"""
  seriesLabel: String

  """Series position"""
  seriesNumber: Float

  """Synopsis"""
  synopsis: String

  """Extracted title"""
  title: String!

  """Translator"""
  translator: String
}

"""Sort field for the book list"""
enum BookSort {
  """Author name"""
  author

  """Number of literary awards"""
  awards

  """Date added"""
  createdAt

  """Literary genre"""
  genre

  """Alphabetical title"""
  title
}

"""Reading status of a book"""
enum BookStatus {
  """Read"""
  READ

  """To read"""
  TO_READ
}

"""Data to confirm and create a book from a scan"""
input ConfirmBookInput {
  """Authors (override)"""
  authors: [String!]

  """Price (override)"""
  estimatedPrice: Float

  """Format (override)"""
  format: String

  """Genre (override)"""
  genre: String

  """Language (override)"""
  language: String

  """Pages (override)"""
  pageCount: Int

  """Preview identifier"""
  previewId: String!

  """Publisher (override)"""
  publisher: String

  """ID of the book to replace (update)"""
  replaceBookId: String

  """Series (override)"""
  series: String

  """Series label (override)"""
  seriesLabel: String

  """Series position (override)"""
  seriesNumber: Float

  """Initial status (to-read or read)"""
  status: String!

  """Synopsis (override)"""
  synopsis: String

  """Title (override)"""
  title: String

  """Translator (override)"""
  translator: String
}

"""Scan confirmation result"""
type ConfirmBookResult {
  """Created or found book"""
  book: Book!

  """Result: created, duplicate, or replaced"""
  tag: String!
}

"""Data to create a review"""
input CreateReviewInput {
  """Personal rating (0-10)"""
  rating: Int!

  """Read date (ISO 8601)"""
  readDate: String

  """Reading notes"""
  reviewNotes: String
}

"""Dashboard view with reading statistics"""
type DashboardView {
  """Book count"""
  bookCount: BookCount!

  """Favorite books"""
  favorites: [FavoriteBook!]!

  """Recent literary awards"""
  recentAwards: [RecentAward!]!

  """Recently added books"""
  recentBooks: [RecentBook!]!
}

"""ISO 8601 date-time string"""
scalar DateTime

"""Favorite book (top-rated)"""
type FavoriteBook {
  """Authors"""
  authors: [String!]!

  """Estimated price in euros"""
  estimatedPrice: Float

  """Genre"""
  genre: String

  """Book ID"""
  id: ID!

  """Rating (0-10)"""
  rating: Int!

  """Read date"""
  readDate: DateTime

  """Title"""
  title: String!
}

"""Book import source"""
enum ImportSource {
  """Audible import"""
  audible

  """ISBN barcode"""
  isbn

  """Cover scan"""
  scan

  """External URL"""
  url
}

type Mutation {
  """Add a review to a book (marks the book as read)"""
  addReview(
    """Book ID"""
    bookId: ID!
    input: CreateReviewInput!
  ): Review!

  """Add a book to favorites (favorite rating + read status)"""
  addToFavorites(
    """Book ID"""
    id: ID!
  ): Book!

  """Scan a book cover to extract metadata"""
  analyzeBookCover(
    """Base64-encoded image"""
    imageBase64: String!

    """Optional OCR text"""
    ocrText: String
  ): BookPreview!

  """Scan an ISBN barcode. Returns null if the book already exists."""
  analyzeISBN(
    """ISBN code (10 or 13 digits)"""
    isbn: String!
  ): BookPreview

  """Import a book from a URL (Goodreads, Storygraph, etc.)"""
  analyzeURL(
    """Shared description"""
    description: String

    """Shared raw text"""
    rawText: String

    """Book URL"""
    url: String!
  ): BookPreview!

  """Complete the Audible OAuth authentication"""
  audibleAuthCallback(
    """Redirect URL with code"""
    redirectUrl: String!

    """Session identifier"""
    sessionId: String!
  ): Boolean!

  """Start the Audible OAuth authentication flow"""
  audibleAuthStart(
    """Audible locale (default: fr)"""
    locale: String
  ): AuthStartResponse!

  """Disconnect the Audible account and clean up data"""
  audibleDisconnect: Boolean!

  """Start importing Audible books (background task)"""
  audibleImportStart: Task!

  """Fetch the Audible library and wishlist (background task)"""
  audibleSyncFetch: Boolean!

  """Verify the Audible credentials validity"""
  audibleSyncVerify: Boolean!

  """Cancel a running or paused task"""
  cancelTask(
    """Task identifier"""
    id: ID!
  ): Task!

  """Confirm and create a book from a scan preview"""
  confirmBook(input: ConfirmBookInput!): ConfirmBookResult!

  """Delete a book and its associated data (review, series)"""
  deleteBook(
    """ID of the book to delete"""
    id: ID!
  ): Boolean!

  """Pause a running task"""
  pauseTask(
    """Task identifier"""
    id: ID!
  ): Task!

  """Re-enrich a book via Gemini (updates metadata)"""
  refreshBook(
    """Book ID"""
    id: ID!
  ): Boolean!

  """Resume a paused task"""
  resumeTask(
    """Task identifier"""
    id: ID!
  ): Task!

  """Update an existing book"""
  updateBook(
    """Book ID"""
    id: ID!
    input: UpdateBookInput!
  ): Book!
}

"""Community rating from an external platform"""
type PublicRating {
  """Maximum possible score"""
  maxScore: Float!

  """Score received"""
  score: Float!

  """Platform name (e.g. Hardcover, Goodreads)"""
  source: String!

  """Link to the book page on the platform"""
  url: String!

  """Number of voters"""
  voterCount: Int!
}

"""External community rating"""
input PublicRatingInput {
  """Maximum possible score"""
  maxScore: Float!

  """Score received"""
  score: Float!

  """Platform name"""
  source: String!

  """URL of the book page"""
  url: String!

  """Number of voters"""
  voterCount: Int!
}

type Query {
  """Audible synchronization status"""
  audibleSync: AudibleSync!

  """Book detail by ID"""
  book(
    """Book ID"""
    id: ID!
  ): Book

  """Book list with filters and sorting"""
  books(
    """Filter by literary genre"""
    genre: String

    """Sort order"""
    order: SortOrder

    """Sort field"""
    sort: BookSort

    """Filter by reading status (to-read, read)"""
    status: String
  ): [Book!]!

  """Dashboard with reading statistics"""
  dashboard: DashboardView!

  """List of all series"""
  series: [Series!]!

  """Series detail by ID"""
  seriesById(
    """Series ID"""
    id: ID!
  ): Series

  """Get a task by its identifier"""
  task(
    """Task identifier"""
    id: ID!
  ): Task
}

"""Recent literary award"""
type RecentAward {
  """Authors"""
  authors: [String!]!

  """Award name"""
  awardName: String!

  """Award year"""
  awardYear: Int!

  """Book title"""
  bookTitle: String!
}

"""Recently added book"""
type RecentBook {
  """Authors"""
  authors: [String!]!

  """Date added"""
  createdAt: DateTime!

  """Genre"""
  genre: String

  """Book ID"""
  id: ID!

  """Title"""
  title: String!
}

"""Personal review and rating of a book"""
type Review {
  """Associated book ID"""
  bookId: ID!

  """Creation date"""
  createdAt: DateTime!

  """Personal rating (0-10)"""
  rating: Int!

  """Read date"""
  readDate: DateTime

  """Reading notes"""
  reviewNotes: String
}

"""A book series"""
type Series {
  """All books in this series"""
  books: [SeriesBookEntry!]!

  """Creation date"""
  createdAt: DateTime!

  """Unique identifier"""
  id: ID!

  """Series name"""
  name: String!
}

"""A book entry within a series"""
type SeriesBookEntry {
  """Book ID"""
  id: ID!

  """Label in series (e.g. Volume 3)"""
  label: String!

  """Position in series"""
  position: Int!

  """Book title"""
  title: String!
}

"""Information about the series a book belongs to"""
type SeriesInfo {
  """All books in the series (same language)"""
  books: [SeriesBookEntry!]!

  """Book label in series"""
  label: String!

  """Series name"""
  name: String!

  """Book position in series"""
  position: Int!
}

"""Sort order"""
enum SortOrder {
  """Ascending"""
  asc

  """Descending"""
  desc
}

"""A background task with progress tracking"""
type Task {
  """Completion date"""
  completedAt: DateTime

  """Number of items processed"""
  current: Int!

  """Unique task identifier"""
  id: ID!

  """Progress message"""
  message: String!

  """Current phase (idle, running, paused, cancelled, completed, failed)"""
  phase: String!

  """Start date"""
  startedAt: DateTime

  """Total number of items"""
  total: Int!
}

"""Editable book fields (all optional)"""
input UpdateBookInput {
  """Authors"""
  authors: [String!]

  """Literary awards"""
  awards: [AwardInput!]

  """Duration (audiobook)"""
  duration: String

  """Estimated price in euros (null to remove)"""
  estimatedPrice: Float

  """Book format"""
  format: BookFormat

  """Literary genre (null to remove)"""
  genre: String

  """ISBN number (null to remove)"""
  isbn: String

  """Language (e.g. fr, en)"""
  language: String

  """Narrators (audiobook)"""
  narrators: [String!]

  """Page count (null to remove)"""
  pageCount: Int

  """Personal notes"""
  personalNotes: String

  """Community ratings"""
  publicRatings: [PublicRatingInput!]

  """Publication date (ISO 8601)"""
  publishedDate: String

  """Publisher (null to remove)"""
  publisher: String

  """Read date (ISO 8601)"""
  readDate: String

  """Series name (null to remove from series)"""
  series: String

  """Label in series"""
  seriesLabel: String

  """Position in series"""
  seriesNumber: Float

  """Reading status"""
  status: BookStatus

  """Synopsis"""
  synopsis: String

  """Book title"""
  title: String

  """Translator (null to remove)"""
  translator: String
}