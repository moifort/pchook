  authors: [String!]

  """Nom du prix"""
  awardName: String

  """Année du prix"""
  awardYear: Int

  """Titre du livre"""
  bookTitle: String
}

"""Livre récemment ajouté"""
type RecentBook {
  """Auteurs"""
  authors: [String!]

  """Date d'ajout (ISO 8601)"""
  createdAt: String

  """Genre"""
  genre: String

  """Identifiant du livre"""
  id: ID

  """Titre"""
  title: String
}

"""Critique et note personnelle d'un livre"""
type Review {
  """Identifiant du livre associé"""
  bookId: ID

  """Date de création (ISO 8601)"""
  createdAt: String

  """Note personnelle (0-10)"""
  rating: Int

  """Date de lecture (ISO 8601)"""
  readDate: String

  """Notes de lecture"""
  reviewNotes: String
}

"""Une série de livres"""
type Series {
  """Date de création (ISO 8601)"""
  createdAt: String

  """Identifiant unique"""
  id: ID

  """Nom de la série"""
  name: String
}

"""Entrée d'un livre dans une série"""
type SeriesBookEntry {
  """Identifiant du livre"""
  id: ID

  """Label dans la série (ex: Tome 3)"""
  label: String

  """Position dans la série"""
  position: Int

  """Titre du livre"""
  title: String
}

"""Informations sur la série à laquelle appartient un livre"""
type SeriesInfo {
  """Tous les livres de la série (même langue)"""
  books: [SeriesBookEntry!]

  """Label du livre dans la série"""
  label: String

  """Nom de la série"""
  name: String

  """Position du livre dans la série"""
  position: Int
}

"""Ordre de tri"""
enum SortOrder {
  """Croissant"""
  asc

  """Décroissant"""
  desc
}

"""Champs modifiables d'un livre (tous optionnels)"""
input UpdateBookInput {
  """Auteurs"""
  authors: [String!]

  """Prix littéraires"""
  awards: [AwardInput!]

  """Durée (livre audio)"""
  duration: String

  """Prix estimé en euros (null pour supprimer)"""
  estimatedPrice: Float

  """Format du livre"""
  format: BookFormat

  """Genre littéraire (null pour supprimer)"""
  genre: String

  """Numéro ISBN (null pour supprimer)"""
  isbn: String

  """Langue (ex: fr, en)"""
  language: String

  """Narrateurs (livre audio)"""
  narrators: [String!]

  """Nombre de pages (null pour supprimer)"""
  pageCount: Int

  """Notes personnelles"""
  personalNotes: String

  """Notes communautaires"""
  publicRatings: [PublicRatingInput!]

  """Date de publication (ISO 8601)"""
  publishedDate: String

  """Éditeur (null pour supprimer)"""
  publisher: String

  """Date de lecture (ISO 8601)"""
  readDate: String

  """Nom de la série (null pour retirer de la série)"""
  series: String

  """Label dans la série"""
  seriesLabel: String

  """Position dans la série"""
  seriesNumber: Float

  """Statut de lecture"""
  status: BookStatus

  """Résumé"""
  synopsis: String

  """Titre du livre"""
  title: String

  """Traducteur (null pour supprimer)"""
  translator: String
}