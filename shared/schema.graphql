  ): [AudibleEntry!]!

  """
  Number of library items
  """
  libraryCount: Int!

  """
  Current sync status
  """
  status: AudibleSyncStatus!

  """
  Last sync state update
  """
  updatedAt: DateTime

  """
  Number of wishlist items
  """
