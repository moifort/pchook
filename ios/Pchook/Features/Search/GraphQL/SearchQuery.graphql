query Search($query: String!, $limit: Int) {
  search(query: $query, limit: $limit) {
    books {
      id
      title
      authors
      language
      status
      coverImageUrl
    }
    series {
      id
      name
      volumeCount
      rating
      languages
    }
    authors {
      name
      bookCount
      firstBookId
    }
  }
}
