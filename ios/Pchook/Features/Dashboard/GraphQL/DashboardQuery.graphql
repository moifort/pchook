query Dashboard {
  dashboard {
    bookCount {
      total
      toRead
      read
      totalAudioMinutes
    }
    favorites {
      id
      title
      authors
      genre
      language
    }
    recentBooks {
      id
      title
      authors
      genre
      language
    }
    recommendedBooks {
      id
      title
      authors
      genre
      language
      recommendedBy
    }
    favoriteSeries {
      id
      name
      volumeCount
      authors
      language
      firstBookId
    }
  }
}
