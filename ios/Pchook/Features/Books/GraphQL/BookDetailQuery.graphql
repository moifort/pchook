query BookDetail($id: BookId!) {
  book(id: $id) {
    id
    title
    authors
    publisher
    publishedDate
    pageCount
    genre
    synopsis
    isbn
    language
    format
    translator
    estimatedPrice
    durationMinutes
    narrators
    personalNotes
    recommendedBy
    status
    readDate
    awards {
      name
      year
    }
    publicRatings {
      source
      score
      maxScore
      voterCount
      url
    }
    importSource
    externalUrl
    createdAt
    updatedAt
    coverImageUrl
    review {
      bookId
      rating
      readDate
      reviewNotes
      createdAt
    }
    series {
      id
      name
      rating
      volumes {
        id
        title
        label
        position
        rating
      }
    }
    seriesVolume {
      id
      title
      label
      position
    }
  }
}
