query BookList($genre: Genre, $status: String, $sort: BookSort, $order: SortOrder) {
  books(genre: $genre, status: $status, sort: $sort, order: $order) {
    id
    title
    authors
    genre
    status
    estimatedPrice
    awards {
      name
      year
    }
    review {
      rating
    }
    language
    series {
      name
    }
    seriesVolume {
      label
      position
    }
    coverImageUrl
    createdAt
  }
}
