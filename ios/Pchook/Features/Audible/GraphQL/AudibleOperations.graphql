query Audible {
  audible {
    sync {
      status
      updatedAt
      library {
        asin
        title
        authors
        narrators
        durationMinutes
        publisher
        language
        coverUrl
        finishedAt
        importedBookId
        series {
          name
          position
        }
      }
      wishlist {
        asin
        title
        authors
        importedBookId
      }
    }
    import {
      status
      updatedAt
      taskId
      importedCount
    }
  }
}

mutation AudibleAuthStart($locale: String) {
  audibleAuthStart(locale: $locale) {
    loginUrl
    sessionId
    cookies {
      name
      value
      domain
    }
  }
}

mutation AudibleAuthCallback($sessionId: String!, $redirectUrl: String!) {
  audibleAuthCallback(sessionId: $sessionId, redirectUrl: $redirectUrl)
}

mutation AudibleDisconnect {
  audibleDisconnect
}

mutation AudibleSyncFetch {
  audibleSyncFetch
}

mutation AudibleSyncVerify {
  audibleSyncVerify
}

mutation AudibleImportStart {
  audibleImportStart {
    id
    phase
    current
    total
    message
    startedAt
    completedAt
  }
}
