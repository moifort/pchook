query Audible {
  audible {
    sync {
      status
      updatedAt
      libraryCount
      wishlistCount
    }
    import {
      status
      importedCount
      totalCount
      delta
      current
      total
      message
      startedAt
      completedAt
    }
  }
}

mutation AudibleAuthStart($locale: String) {
  audibleAuthStart(locale: $locale) {
    loginUrl
    sessionId
    cookies {
      name
      value
      domain
    }
  }
}

mutation AudibleAuthCallback($sessionId: String!, $redirectUrl: String!) {
  audibleAuthCallback(sessionId: $sessionId, redirectUrl: $redirectUrl)
}

mutation AudibleDisconnect {
  audibleDisconnect
}

mutation AudibleSyncFetch {
  audibleSyncFetch
}

mutation AudibleSyncVerify {
  audibleSyncVerify
}

mutation AudibleImportStart {
  audibleImportStart {
    status
    importedCount
    totalCount
    delta
    current
    total
    message
    startedAt
    completedAt
  }
}

mutation AudibleImportPause {
  audibleImportPause {
    status
    current
    total
    message
  }
}

mutation AudibleImportResume {
  audibleImportResume {
    status
    current
    total
    message
  }
}

mutation AudibleImportCancel {
  audibleImportCancel {
    status
  }
}
