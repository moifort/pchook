query Audible {
  audible {
    sync {
      status
      updatedAt
      entries {
        item {
          asin
          title
          authors
          narrators
          durationMinutes
          publisher
          language
          coverUrl
          finishedAt
          series {
            name
            position
          }
        }
        source
        downloadedAt
      }
    }
    import {
      status
      updatedAt
      taskId
      importedCount
      mappings {
        asin
        bookId
      }
    }
  }
}

mutation AudibleAuthStart($locale: String) {
  audibleAuthStart(locale: $locale) {
    loginUrl
    sessionId
    cookies {
      name
      value
      domain
    }
  }
}

mutation AudibleAuthCallback($sessionId: String!, $redirectUrl: String!) {
  audibleAuthCallback(sessionId: $sessionId, redirectUrl: $redirectUrl)
}

mutation AudibleDisconnect {
  audibleDisconnect
}

mutation AudibleSyncFetch {
  audibleSyncFetch
}

mutation AudibleSyncVerify {
  audibleSyncVerify
}

mutation AudibleImportStart {
  audibleImportStart {
    id
    phase
    current
    total
    message
    startedAt
    completedAt
  }
}
