query Audible {
  audible {
    sync {
      status
      updatedAt
      libraryCount
      wishlistCount
      entries {
        asin
        title
        authors
        narrators
        durationMinutes
        publisher
        language
        coverUrl
        finishedAt
        seriesName
        seriesPosition
        source
        downloadedAt
      }
    }
    import {
      status
      updatedAt
      importedCount
      totalCount
      delta
      phase
      current
      total
      message
      startedAt
      completedAt
    }
  }
}

mutation AudibleAuthStart($locale: String) {
  audibleAuthStart(locale: $locale) {
    loginUrl
    sessionId
    cookies {
      name
      value
      domain
    }
  }
}

mutation AudibleAuthCallback($sessionId: String!, $redirectUrl: String!) {
  audibleAuthCallback(sessionId: $sessionId, redirectUrl: $redirectUrl)
}

mutation AudibleDisconnect {
  audibleDisconnect
}

mutation AudibleSyncFetch {
  audibleSyncFetch
}

mutation AudibleSyncVerify {
  audibleSyncVerify
}

mutation AudibleImportStart {
  audibleImportStart {
    status
    importedCount
    totalCount
    delta
    phase
    current
    total
    message
    startedAt
    completedAt
  }
}

mutation AudibleImportPause {
  audibleImportPause {
    phase
    current
    total
    message
  }
}

mutation AudibleImportResume {
  audibleImportResume {
    phase
    current
    total
    message
  }
}

mutation AudibleImportCancel {
  audibleImportCancel {
    phase
  }
}
