services:
  server:
    image: ghcr.io/moifort/pchook:main@sha256:ecac3c07a82452ca9167aea8eb46ad469844908da1e3c9415995ea5ae1e9c9a4
    container_name: pchook-server
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: "3000"
      NITRO_API_TOKEN: ${NITRO_API_TOKEN}
      NITRO_ANTHROPIC_API_KEY: ${NITRO_ANTHROPIC_API_KEY}
      NITRO_GOOGLE_API_KEY: ${NITRO_GOOGLE_API_KEY}
      NITRO_HARDCOVER_API_TOKEN: ${NITRO_HARDCOVER_API_TOKEN}
      NITRO_SERVER_URL: http://127.0.0.1:3000
      NITRO_SENTRY_DSN: ${NITRO_SENTRY_DSN}
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/.data
